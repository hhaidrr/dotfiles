# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
# bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER, B, Browser, exec, $browser # doesnt work with tty
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private # doesnt work with tty
# bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify # doesnt work with tty
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor # doesnt work with tty
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
# bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian" # doesnt work with tty 
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER, A, Gemini, exec, omarchy-launch-or-focus-webapp "Gemini" "https://gemini.google.com/app" # doesnt work with tty
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com" # doesnt work with tty
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/" # doesnt work with tty
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com" # doesnt work with tty
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/" # doesnt work with tty
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/" # doesnt work with tty
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations" # doesnt work with tty
# bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, P, Perplexity, exec, omarchy-launch-or-focus-webapp "Perplexity" "https://www.perplexity.ai/" # doesnt work with tty
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/" # doesnt work with tty
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post" # doesnt work with tty

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# bindd = SUPER SHIFT, S, Screenshot with Editing, exec, omarchy-cmd-screenshot # doesnt work with tty
bind = SUPER SHIFT, S, exec, omarchy-capture-screenshot      # Print Screen Button
unbind = CTRL, semicolon

# Switch workspaces with SUPER + [0-9]
bindd = CTRL, code:10, Switch to workspace 1, workspace, 1
bindd = CTRL, code:11, Switch to workspace 2, workspace, 2
bindd = CTRL, code:12, Switch to workspace 3, workspace, 3
bindd = CTRL, code:13, Switch to workspace 4, workspace, 4
bindd = CTRL, code:14, Switch to workspace 5, workspace, 5
# bindd = CTRL, code:15, Switch to workspace 6, workspace, 6 # conflicts with vim binding to go to previous buffer
# bindd = CTRL, code:16, Switch to workspace 7, workspace, 7
# bindd = CTRL, code:17, Switch to workspace 8, workspace, 8
# bindd = CTRL, code:18, Switch to workspace 9, workspace, 9
# bindd = CTRL, code:19, Switch to workspace 10, workspace, 10

bindd = CTRL ALT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = CTRL ALT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = CTRL ALT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = CTRL ALT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = CTRL ALT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = CTRL ALT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = CTRL ALT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = CTRL ALT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = CTRL ALT, code:18, Move window to workspace 9, movetoworkspace, 9


# unbind original universal copy
# unbind = SUPER, C
# bindd = CTRL, C, Copy, exec, omarchy-cmd-copy

# unbind original toggle split
unbind = SUPER, J
# rebind to arrow up key
# bindd = SUPER, DOWN, Toggle split, togglesplit, # dwindle

# Unbind toggle scrolling
unbind = SUPER, L
# unbind original show keybinds
unbind = SUPER, K
# rebind to arrow down key
bindd = SUPER, UP, Show key bindings, exec, omarchy-menu-keybindings # doesnt work with tty

# Move focus with SUPER + Vim navigation (hjkl)
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
bindd = SUPER, J, Move focus up, movefocus, u
bindd = SUPER, K, Move focus down, movefocus, d

# Navigate a single set of grouped windows
unbind = SUPER ALT, TAB
unbind = SUPER ALT SHIFT, TAB
bindd = CTRL ALT, TAB, Next window in group, changegroupactive, f
bindd = CTRL ALT SHIFT, TAB, Previous window in group, changegroupactive, b

